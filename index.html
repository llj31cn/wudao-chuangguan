<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta property="og:title" content="林子三教正宗统论 · 悟道闯关">
<meta property="og:description" content="36册闯关答题，深度参悟林兆恩三教合一思想">
<meta property="og:type" content="website">
<title>林子三教正宗统论 · 悟道闯关</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
:root {
  --bg-dark: #0a0a08; --bg-zen: #1a1815; --bg-card: #222019; --bg-card-light: #2d2b24;
  --text-zen: #f0e8d6; --text-light: #ffffff; --text-muted: #d0c8b0;
  --gold: #e8c060; --gold-dim: #b89848; --gold-glow: rgba(232,192,96,0.22);
  --vermillion: #e05848; --teal-zen: #78d0a0; --purple-zen: #b898d8;
  --border-zen: #6a6050;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: "Noto Serif SC","Source Han Serif SC","SimSun",serif;
  background: var(--bg-dark); color: var(--text-zen); line-height: 2.6; font-size: 22px;
  min-height: 100vh; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.hero {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height: 60vh; text-align:center; padding:60px 28px 30px;
  background: radial-gradient(ellipse at center, var(--bg-zen) 0%, var(--bg-dark) 70%);
}
.hero .logo-img {
  width:120px; height:120px; border-radius:50%; object-fit:cover;
  margin-bottom:30px; border:3px solid var(--gold);
  animation: glow 3s ease-in-out infinite;
  background:radial-gradient(circle,var(--gold-glow) 0%,transparent 70%);
}
@keyframes glow {
  0%,100% { box-shadow:0 0 28px rgba(232,192,96,0.25); }
  50% { box-shadow:0 0 56px rgba(232,192,96,0.45); }
}
.hero h1 { font-size:32px; color:var(--gold); letter-spacing:6px; margin-bottom:12px; font-weight:700; }
.hero .sub { font-size:18px; color:var(--text-muted); margin-bottom:6px; letter-spacing:2px; }
.hero .desc { font-size:16px; color:var(--text-muted); max-width:600px; line-height:2.2; margin-top:16px; }

.section-title {
  text-align:center; font-size:24px; color:var(--gold); letter-spacing:4px;
  margin:20px 0 10px; font-weight:600;
}
.section-sub {
  text-align:center; font-size:16px; color:var(--text-muted); margin-bottom:24px;
}

.book-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px; max-width:900px; margin:0 auto; padding:0 20px 60px;
}
.book-card {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--bg-card); border:1px solid var(--border-zen); border-radius:10px;
  padding:24px 12px; cursor:pointer; transition:all 0.3s; text-decoration:none;
  min-height:120px; position:relative; overflow:hidden;
}
.book-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0; transition:opacity 0.3s;
}
.book-card:hover { background:var(--bg-card-light); border-color:var(--gold-dim); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.4); }
.book-card:hover::before { opacity:1; }
.book-card .book-num { font-size:14px; color:var(--gold-dim); margin-bottom:6px; letter-spacing:2px; }
.book-card .book-name { font-size:18px; color:var(--text-zen); font-weight:600; text-align:center; line-height:1.6; }
.book-card .book-status { font-size:13px; margin-top:8px; padding:2px 10px; border-radius:10px; }
.book-card .status-available { background:rgba(120,208,160,0.15); color:var(--teal-zen); }
.book-card .status-soon { background:rgba(208,200,176,0.1); color:var(--text-muted); }

.footer {
  text-align:center; padding:30px 20px; font-size:14px; color:var(--text-muted);
  border-top:1px solid var(--border-zen); line-height:2;
}

@media (max-width:600px) {
  .hero h1 { font-size:26px; letter-spacing:4px; }
  .hero .sub { font-size:16px; }
  .book-grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; }
  .book-card .book-name { font-size:16px; }
}
</style>
</head>
<body>

<div class="hero">
  <img src="logo.png" class="logo-img" alt="悟">
  <h1>林子三教正宗统论</h1>
  <div class="sub">悟道闯关 · 36册参悟之旅</div>
  <div class="desc">
    儒释道三教合一，心身性命之学<br>
    每关精选原文，选项皆似合理，唯有真悟者方能辨明<br>
    选择一册开始你的参悟之旅
  </div>
</div>

<div class="section-title">选择册数</div>
<div class="section-sub">点击进入对应册的闯关答题</div>

<div class="book-grid" id="bookGrid"></div>

<div class="footer">
  林子三教正宗统论 · 悟道闯关<br>
  基于林兆恩《林子三教正宗统论》 · 三教合一 · 归儒宗孔
</div>

<script>
var books = [
  {num:1, name:"第一册", available:true, levels:123, questions:246},
  {num:2, name:"第二册", available:true, levels:196, questions:392},
  {num:3, name:"第三册", available:true, levels:175, questions:235},
];

// Generate 36 book cards
var grid = document.getElementById('bookGrid');
var html = '';
for (var i = 1; i <= 36; i++) {
  var book = books.find(function(b){return b.num===i;});
  var available = book && book.available;
  var levels = book ? book.levels : 0;
  var questions = book ? book.questions : 0;
  var statusHtml = available
    ? '<div class="book-status status-available">'+levels+'关 '+questions+'题</div>'
    : '<div class="book-status status-soon">敬请期待</div>';
  var clickHandler = available
    ? 'onclick="window.location.href=\'book-'+i+'/index.html\'"'
    : 'onclick="alert(\'第'+i+'册正在整理中，敬请期待！\')"';
  html += '<a class="book-card" '+clickHandler+'>'
    + '<div class="book-num">第'+i+'册</div>'
    + '<div class="book-name">'+(available?'可闯关':'待开放')+'</div>'
    + statusHtml
    + '</a>';
}
grid.innerHTML = html;
</script>

</body>
</html>
