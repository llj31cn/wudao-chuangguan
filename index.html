<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<meta property="og:title" content="林子三教正宗统论 · 悟道闯关">
<meta property="og:description" content="36册闯关答题，深度参悟林兆恩三教合一思想">
<meta property="og:type" content="website">
<title>林子三教正宗统论 · 悟道闯关</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');
:root {
  --bg-dark: #0a0a08; --bg-zen: #1a1815; --bg-card: #222019; --bg-card-light: #2d2b24;
  --text-zen: #f0e8d6; --text-light: #ffffff; --text-muted: #d0c8b0;
  --gold: #e8c060; --gold-dim: #b89848; --gold-glow: rgba(232,192,96,0.22);
  --vermillion: #e05848; --teal-zen: #78d0a0; --purple-zen: #b898d8;
  --border-zen: #6a6050;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: "Noto Serif SC","Source Han Serif SC","SimSun",serif;
  background: var(--bg-dark); color: var(--text-zen); line-height: 2.6; font-size: 22px;
  min-height: 100vh; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.hero {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height: 40vh; text-align:center; padding:60px 28px 30px;
  background: radial-gradient(ellipse at center, var(--bg-zen) 0%, var(--bg-dark) 70%);
}
.hero .logo-img {
  width:140px; height:140px; border-radius:50%; object-fit:cover;
  margin-bottom:30px; border:3px solid var(--gold);
  animation: glow 3s ease-in-out infinite;
  background:radial-gradient(circle,var(--gold-glow) 0%,transparent 70%);
}
@keyframes glow {
  0%,100% { box-shadow:0 0 28px rgba(232,192,96,0.25); }
  50% { box-shadow:0 0 56px rgba(232,192,96,0.45); }
}
.hero h1 { font-size:32px; color:var(--gold); letter-spacing:6px; margin-bottom:12px; font-weight:700; }
.hero .sub { font-size:18px; color:var(--text-muted); margin-bottom:6px; letter-spacing:2px; }
.hero .desc { font-size:16px; color:var(--text-muted); max-width:600px; line-height:2.2; margin-top:16px; }

/* ═══ 注册道号 ═══ */
.zen-register-box {
  margin:20px auto; padding:20px 24px; background:var(--bg-card); border:2px solid var(--border-zen);
  border-radius:8px; max-width:360px; text-align:center;
}
.reg-title { font-size:22px; color:var(--gold); letter-spacing:4px; margin-bottom:12px; font-weight:600; }
.reg-input {
  font-size:24px; padding:12px 16px; border:2px solid var(--border-zen); border-radius:6px;
  background:var(--bg-card); color:var(--text-zen); font-family:inherit;
  width:100%; text-align:center; outline:none; margin-bottom:10px;
}
.reg-input-pwd { -webkit-text-security:disc; }
.reg-input:focus { border-color:var(--gold); }
.reg-hint { font-size:18px; color:var(--text-muted); line-height:2.4; margin-bottom:12px; }
.reg-btn {
  padding:14px 40px; border:2px solid var(--gold); background:transparent;
  color:var(--gold); font-family:inherit; font-size:22px; letter-spacing:4px;
  cursor:pointer; transition:all 0.4s; border-radius:6px;
  -webkit-tap-highlight-color: transparent;
}
.reg-btn:hover,.reg-btn:active { background:var(--gold-glow); box-shadow:0 0 40px rgba(232,192,96,0.4); }
.reg-registered { font-size:22px; color:var(--teal-zen); letter-spacing:2px; }
.reg-registered .name-val { color:#fff; font-weight:700; font-size:24px; }

.section-title {
  text-align:center; font-size:24px; color:var(--gold); letter-spacing:4px;
  margin:20px 0 10px; font-weight:600;
}
.section-sub {
  text-align:center; font-size:16px; color:var(--text-muted); margin-bottom:24px;
}

.book-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:16px; max-width:900px; margin:0 auto; padding:0 20px 60px;
}
.book-card {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:var(--bg-card); border:1px solid var(--border-zen); border-radius:10px;
  padding:24px 12px; cursor:pointer; transition:all 0.3s; text-decoration:none;
  min-height:120px; position:relative; overflow:hidden;
}
.book-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0; transition:opacity 0.3s;
}
.book-card:hover { background:var(--bg-card-light); border-color:var(--gold-dim); transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.4); }
.book-card:hover::before { opacity:1; }
.book-card .book-num { font-size:14px; color:var(--gold-dim); margin-bottom:6px; letter-spacing:2px; }
.book-card .book-name { font-size:18px; color:var(--text-zen); font-weight:600; text-align:center; line-height:1.6; }
.book-card .book-status { font-size:13px; margin-top:8px; padding:2px 10px; border-radius:10px; }
.book-card .status-available { background:rgba(120,208,160,0.15); color:var(--teal-zen); }
.book-card .status-soon { background:rgba(208,200,176,0.1); color:var(--text-muted); }

.footer {
  text-align:center; padding:30px 20px; font-size:14px; color:var(--text-muted);
  border-top:1px solid var(--border-zen); line-height:2;
}

@media (max-width:600px) {
  .hero h1 { font-size:26px; letter-spacing:4px; }
  .hero .sub { font-size:16px; }
  .hero { min-height:30vh; }
  .zen-register-box { max-width:90%; }
  .book-grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px; }
  .book-card .book-name { font-size:16px; }
}
</style>
</head>
<body>

<div class="hero">
  <img src="logo.jpg" class="logo-img" alt="林子像">
  <h1>林子三教正宗统论</h1>
  <div class="sub">悟道闯关 · 36册参悟之旅</div>
  <div class="desc">
    儒释道三教合一，心身性命之学<br>
    选项皆似合理，唯有真悟者方能辨明
  </div>
</div>

<!-- 注册道号 -->
<div class="zen-register-box" id="registerBox">
  <div class="reg-title">注册道号 · 留名悟境</div>
  <input type="text" class="reg-input" id="regNameInput" maxlength="8" placeholder="输入您的道号">
  <input type="text" class="reg-input reg-input-pwd" id="regPwdInput" maxlength="8" placeholder="输入任意口令（如1234）" inputmode="numeric">
  <div class="reg-hint">道号将显示在积分与榜单上<br>口令防止他人冒用您的道号<br>答对一题 +1分<br>道号跨册通用——一册注册即可通行全部</div>
  <button class="reg-btn" onclick="registerName()" id="regBtn" type="button">注 册 登 堂</button>
</div>

<div class="section-title">正宗册数</div>
<div class="section-sub">点击进入对应册的闯关答题</div>

<div class="book-grid" id="bookGrid"></div>

<div class="footer">
  林子三教正宗统论 · 悟道闯关<br>
  基于林兆恩《林子三教正宗统论》 · 三教合一 · 归儒宗孔
</div>

<script>
var books = [
  {num:1, name:"第一册", available:true, levels:123, questions:246},
  {num:2, name:"第二册", available:true, levels:196, questions:392},
  {num:3, name:"第三册", available:true, levels:175, questions:235},
  {num:4, name:"第四册", available:true, levels:134, questions:268},
  {num:5, name:"第五册", available:true, levels:137, questions:274},
];

// Registration
var playerName = localStorage.getItem('zen_name') || '';
var isRegistered = !!playerName;

function registerName() {
  var nameInput = document.getElementById('regNameInput');
  var pwdInput = document.getElementById('regPwdInput');
  var name = nameInput ? nameInput.value.trim() : '';
  var pwd = pwdInput ? pwdInput.value.trim() : '';
  if (!name) {
    nameInput.style.borderColor = '#e74c3c';
    nameInput.setAttribute('placeholder', '请输入道号');
    setTimeout(function(){ nameInput.style.borderColor = ''; }, 2000);
    return;
  }
  if (!pwd) {
    pwdInput.style.borderColor = '#e74c3c';
    pwdInput.setAttribute('placeholder', '请输入口令');
    setTimeout(function(){ pwdInput.style.borderColor = ''; }, 2000);
    return;
  }
  playerName = name;
  isRegistered = true;
  localStorage.setItem('zen_name', name);
  localStorage.setItem('zen_pwd_' + name, pwd);
  updateRegisterUI();
}

function updateRegisterUI() {
  var regBox = document.getElementById('registerBox');
  if (!regBox) return;
  if (isRegistered && playerName) {
    var score = parseInt(localStorage.getItem('zen_score') || '0');
    regBox.innerHTML = '<div class="reg-registered">✦ 道号：<span class="name-val">' + playerName + '</span></div>'
      + '<div style="font-size:22px;color:var(--text-zen);text-align:center;margin-top:8px">悟境 ' + score + ' 分 · 答对+1</div>'
      + '<div style="font-size:20px;color:var(--gold);text-align:center;letter-spacing:4px;margin-top:10px">✦ 道号已记录于榜单 · 跨册通用</div>';
  }
}

// Generate 36 book cards
var grid = document.getElementById('bookGrid');
var html = '';
for (var i = 1; i <= 36; i++) {
  var book = books.find(function(b){return b.num===i;});
  var available = book && book.available;
  var levels = book ? book.levels : 0;
  var questions = book ? book.questions : 0;
  var statusHtml = available
    ? '<div class="book-status status-available">'+levels+'关 '+questions+'题</div>'
    : '<div class="book-status status-soon">敬请期待</div>';
  var clickHandler = available
    ? 'onclick="window.location.href=\'book-'+i+'/index.html\'"'
    : 'onclick="alert(\'第'+i+'册正在整理中，敬请期待！\')"';
  html += '<a class="book-card" '+clickHandler+'>'
    + '<div class="book-num">第'+i+'册</div>'
    + '<div class="book-name">'+(available?'可闯关':'待开放')+'</div>'
    + statusHtml
    + '</a>';
}
grid.innerHTML = html;
</script>

</body>
</html>
